user root;
worker_processes 1;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_body_temp_path /data/code-editor/nginx/body;
    proxy_temp_path /data/code-editor/nginx/proxy;
    fastcgi_temp_path /data/code-editor/nginx/fastcgi;
    uwsgi_temp_path /data/code-editor/nginx/uwsgi;
    scgi_temp_path /data/code-editor/nginx/scgi;

    access_log off;
    error_log /dev/stdout info;
    sendfile on;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 1337;

        allow 172.30.32.2;
        deny all;

        location / {
            proxy_pass http://127.0.0.1:1338;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
